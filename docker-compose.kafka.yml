# Optional overlay: single-node KRaft Kafka for the transcript side-channel.
# NOT needed for the proxy itself or capacity benchmarks (-sidechannel=off).
#
#   docker compose -f docker-compose.yml -f docker-compose.kafka.yml up --build
#
# With Redis rate limiting too, use docker-compose.redis-kafka.yml instead —
# stacking -f redis.yml -f kafka.yml does not merge proxy command lists.
#
# Inspect events:
#   docker compose exec kafka /opt/kafka/bin/kafka-console-consumer.sh \
#     --bootstrap-server localhost:9092 --topic transcripts --from-beginning
services:
  kafka:
    image: apache/kafka:3.9.1
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 3 partitions so the user_id partition key actually demonstrates ordering.
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  replay:
    build:
      context: .
      dockerfile: Dockerfile.replay
    restart: unless-stopped
    command:
      - -addr
      - :8090
      - -kafka
      - kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  proxy:
    command:
      - -addr
      - :8080
      - -sidechannel
      - kafka
      - -kafka
      - kafka:9092
      - -replay-url
      - http://replay:8090
    depends_on:
      kafka:
        condition: service_healthy
      replay:
        condition: service_started
