services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  proxy:
    build:
      context: .
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.io,direct}
    image: rt-llm-proxy:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env or the shell}
    command:
      - -addr
      - :8080
      - -redis
      - redis:6379
      - -rl-max
      - "10"
      - -rl-window
      - 1m
    depends_on:
      redis:
        condition: service_healthy
