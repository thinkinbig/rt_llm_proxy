<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>rt-llm-proxy</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e6e8ee;
    --muted: #8b93a3;
    --accent: #6c8cff;
    --ok: #34d399;
    --warn: #fbbf24;
    --err: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(1200px 600px at 50% -10%, #1a1f2b, var(--bg));
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .app { width: 100%; max-width: 480px; }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 20px; margin: 0; letter-spacing: .3px; }
  header p { color: var(--muted); margin: 6px 0 0; font-size: 13px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
  }

  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .row label { color: var(--muted); font-size: 13px; width: 64px; flex: none; }
  select {
    flex: 1; appearance: none;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 14px; cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }

  .mic-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; margin: 8px 0 18px; }
  .mic-btn {
    width: 96px; height: 96px; border-radius: 50%;
    border: none; cursor: pointer; position: relative;
    background: var(--accent); color: #fff;
    display: grid; place-items: center;
    transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
    box-shadow: 0 8px 24px rgba(108,140,255,.35);
  }
  .mic-btn:hover { transform: translateY(-2px); }
  .mic-btn:active { transform: translateY(0); }
  .mic-btn svg { width: 38px; height: 38px; }
  .mic-btn.live { background: var(--err); box-shadow: 0 8px 24px rgba(248,113,113,.4); }
  .mic-btn.live::after {
    content: ""; position: absolute; inset: -6px; border-radius: 50%;
    border: 2px solid var(--err); opacity: .6; animation: pulse 1.6s ease-out infinite;
  }
  .mic-btn:disabled { background: var(--panel-2); color: var(--muted); cursor: default; box-shadow: none; }
  @keyframes pulse { 0% { transform: scale(1); opacity: .6; } 100% { transform: scale(1.5); opacity: 0; } }

  .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); transition: background .2s; }
  .dot.connecting { background: var(--warn); animation: blink 1s infinite; }
  .dot.live { background: var(--ok); }
  .dot.error { background: var(--err); }
  @keyframes blink { 50% { opacity: .3; } }

  .meters { display: flex; flex-direction: column; gap: 12px; margin-top: 4px; }
  .meter { }
  .meter .lbl { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .bar { height: 8px; border-radius: 6px; background: var(--panel-2); overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0%; border-radius: 6px; transition: width .08s linear; }
  .bar.you > i { background: linear-gradient(90deg, #4f7cff, #6c8cff); }
  .bar.ai > i { background: linear-gradient(90deg, #2bbf87, #34d399); }

  details { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 12px; }
  summary { cursor: pointer; color: var(--muted); font-size: 12px; }
  #log {
    margin-top: 10px; height: 130px; overflow-y: auto;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px; font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace; color: var(--muted);
    white-space: pre-wrap; word-break: break-word;
  }
  .hint { text-align: center; color: var(--muted); font-size: 12px; margin-top: 16px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>rt-llm-proxy</h1>
    <p>实时语音 · WebRTC → 流式 LLM</p>
  </header>

  <div class="card">
    <div class="row">
      <label for="model">模型</label>
      <select id="model">
        <option value="gemini" selected>Gemini Live</option>
        <option value="doubao">豆包 (端到端实时语音)</option>
      </select>
    </div>
    <div class="row">
      <label for="mic">麦克风</label>
      <select id="mic"><option value="">默认设备</option></select>
    </div>

    <div class="mic-wrap">
      <button id="toggle" class="mic-btn" title="开始 / 结束">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z"/>
          <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 1 0 2 0v-3.08A7 7 0 0 0 19 11Z"/>
        </svg>
      </button>
      <div class="status"><span id="dot" class="dot"></span><span id="status-text">未连接</span></div>
    </div>

    <div class="meters">
      <div class="meter">
        <div class="lbl"><span>你</span><span id="you-pct">—</span></div>
        <div class="bar you"><i id="you-bar"></i></div>
      </div>
      <div class="meter">
        <div class="lbl"><span>AI</span><span id="ai-pct">—</span></div>
        <div class="bar ai"><i id="ai-bar"></i></div>
      </div>
    </div>

    <details>
      <summary>事件日志</summary>
      <div id="log"></div>
    </details>
  </div>

  <p class="hint">用 <b>http://localhost</b> 访问才能授权麦克风。点麦克风按钮开始，再点结束。</p>

  <audio id="audio" autoplay></audio>
</div>
<script src="client.js"></script>
</body>
</html>
