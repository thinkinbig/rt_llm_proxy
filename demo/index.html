<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>rt-llm-proxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #334155;
    --border: #475569;
    --text: #f8fafc;
    --muted: #94a3b8;
    --accent: #22c55e;
    --accent-dim: #16a34a;
    --ok: #34d399;
    --warn: #fbbf24;
    --err: #ef4444;
    --ring: rgba(34, 197, 94, 0.45);
    --radius: 12px;
    --space: 8px;
  }
  * { box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
  body {
    margin: 0;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.45 Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 16px 12px 20px;
  }
  .app { width: 100%; max-width: 400px; }

  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .brand h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .brand p {
    margin: 2px 0 0;
    font-size: 11px;
    color: var(--muted);
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .toolbar {
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 6px 8px;
    align-items: center;
    margin-bottom: 12px;
  }
  .toolbar label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
  }
  select {
    width: 100%;
    appearance: none;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }
  select:hover { border-color: #64748b; }
  select:focus { outline: 2px solid var(--ring); outline-offset: 1px; border-color: var(--accent); }

  .hero {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    align-items: center;
    padding: 10px 0 12px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .mic-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    flex: none;
    background: var(--accent);
    color: #052e16;
    display: grid;
    place-items: center;
    transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 16px rgba(34, 197, 94, 0.35);
  }
  .mic-btn:hover:not(:disabled) { transform: scale(1.03); }
  .mic-btn:active:not(:disabled) { transform: scale(0.98); }
  .mic-btn:focus-visible { outline: 2px solid var(--ring); outline-offset: 3px; }
  .mic-btn svg { width: 30px; height: 30px; }
  .mic-btn.live {
    background: var(--err);
    color: #fff;
    box-shadow: 0 4px 16px rgba(239, 68, 68, 0.35);
  }
  .mic-btn.live::after {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid var(--err);
    opacity: 0.5;
    animation: pulse 1.6s ease-out infinite;
  }
  .mic-btn:disabled {
    background: var(--panel-2);
    color: var(--muted);
    cursor: wait;
    box-shadow: none;
    transform: none;
  }
  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  .status-block { min-width: 0; }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex: none;
    transition: background 0.2s;
  }
  .dot.connecting { background: var(--warn); animation: blink 1s infinite; }
  .dot.live { background: var(--ok); box-shadow: 0 0 8px rgba(52, 211, 153, 0.6); }
  .dot.error { background: var(--err); }
  @keyframes blink { 50% { opacity: 0.35; } }
  .status-hint {
    margin: 4px 0 0;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.35;
  }

  .meters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .meter .lbl {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .bar {
    height: 6px;
    border-radius: 4px;
    background: var(--panel-2);
    overflow: hidden;
  }
  .bar > i {
    display: block;
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.08s linear;
  }
  .bar.you > i { background: linear-gradient(90deg, #4ade80, var(--accent)); }
  .bar.ai > i { background: linear-gradient(90deg, #38bdf8, #60a5fa); }

  .transcript-panel {
    margin-top: 12px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .transcript-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .transcript-head h2 {
    margin: 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .transcript-badge {
    font-size: 10px;
    font-weight: 500;
    color: var(--accent);
    background: rgba(34, 197, 94, 0.12);
    border: 1px solid rgba(34, 197, 94, 0.25);
    border-radius: 999px;
    padding: 2px 8px;
  }
  .transcript-badge.off {
    color: var(--muted);
    background: var(--panel-2);
    border-color: var(--border);
  }
  #transcript {
    max-height: 168px;
    min-height: 72px;
    overflow-y: auto;
    scroll-behavior: smooth;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .transcript-empty {
    margin: auto;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.45;
    padding: 8px 4px;
  }
  .bubble {
    max-width: 92%;
    padding: 8px 10px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.45;
    word-break: break-word;
  }
  .bubble.user {
    align-self: flex-end;
    background: rgba(34, 197, 94, 0.14);
    border: 1px solid rgba(34, 197, 94, 0.45);
    color: #ecfdf5;
  }
  .bubble.model {
    align-self: flex-start;
    background: rgba(56, 189, 248, 0.12);
    border: 1px solid rgba(56, 189, 248, 0.42);
    color: #f0f9ff;
  }
  .bubble-label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .bubble.user .bubble-label { color: #4ade80; }
  .bubble.model .bubble-label { color: #38bdf8; }

  details.log-panel {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  details.log-panel summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    list-style: none;
    user-select: none;
  }
  details.log-panel summary::-webkit-details-marker { display: none; }
  details.log-panel summary::after {
    content: " ▸";
    display: inline-block;
    transition: transform 0.15s ease;
  }
  details.log-panel[open] summary::after { transform: rotate(90deg); }
  details.log-panel summary:focus-visible { outline: 2px solid var(--ring); border-radius: 4px; }
  #log {
    margin-top: 6px;
    max-height: 88px;
    overflow-y: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    font: 11px/1.4 ui-monospace, Menlo, Consolas, monospace;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .foot {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.35;
  }
  .foot kbd {
    font: inherit;
    padding: 1px 5px;
    border-radius: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand">
      <h1>rt-llm-proxy</h1>
      <p>实时语音 · WebRTC</p>
    </div>
  </div>

  <div class="card">
    <div class="toolbar">
      <label for="model">模型</label>
      <select id="model" aria-label="选择模型">
        <option value="gemini" selected>Gemini Live</option>
        <option value="doubao">豆包实时语音</option>
        <option value="loopback">Loopback (压测假后端)</option>
        <option value="cascade">Cascade (ASR→LLM→TTS 演示桩)</option>
      </select>
      <label for="mic">麦克风</label>
      <select id="mic" aria-label="选择麦克风"><option value="">默认</option></select>
    </div>

    <div class="hero">
      <button id="toggle" class="mic-btn" type="button" aria-label="开始通话" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z"/>
          <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.92V21a1 1 0 1 0 2 0v-3.08A7 7 0 0 0 19 11Z"/>
        </svg>
      </button>
      <div class="status-block">
        <div class="status" role="status" aria-live="polite">
          <span id="dot" class="dot" aria-hidden="true"></span>
          <span id="status-text">未连接</span>
        </div>
        <p id="status-hint" class="status-hint">点麦克风开始，再点结束</p>
      </div>
    </div>

    <div class="meters" aria-label="音量">
      <div class="meter">
        <div class="lbl"><span>你</span><span id="you-pct">—</span></div>
        <div class="bar you"><i id="you-bar"></i></div>
      </div>
      <div class="meter">
        <div class="lbl"><span>AI</span><span id="ai-pct">—</span></div>
        <div class="bar ai"><i id="ai-bar"></i></div>
      </div>
    </div>

    <section class="transcript-panel" aria-labelledby="transcript-title">
      <div class="transcript-head">
        <h2 id="transcript-title">字幕</h2>
        <span id="transcript-badge" class="transcript-badge off">Gemini</span>
      </div>
      <div id="transcript" role="log" aria-live="polite" aria-relevant="additions text">
        <p class="transcript-empty" id="transcript-empty">连接 Gemini 后开始显示语音转文字</p>
      </div>
    </section>

    <details class="log-panel">
      <summary>日志</summary>
      <div id="log" role="log" aria-live="off"></div>
    </details>
  </div>

  <p class="foot">需通过 <kbd>http://localhost</kbd> 访问以授权麦克风</p>
  <audio id="audio" autoplay hidden></audio>
</div>
<script src="client.js"></script>
</body>
</html>
