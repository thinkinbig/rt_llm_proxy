# Default image — build locally: docker build -t rt-llm-proxy:latest .
image:
  repository: rt-llm-proxy
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: NodePort
  port: 8080
  # Set for Minikube (30000–32767). Leave null to auto-assign.
  nodePort: 30080

resources: {}

redis:
  enabled: true
  image: redis:7-alpine
  pullPolicy: IfNotPresent
  port: 6379
  resources: {}

rateLimit:
  max: 10
  window: 1m

# Gemini API key. Prefer --set gemini.apiKey=... or an existing Secret.
gemini:
  apiKey: ""
  model: ""
  existingSecret: ""
  existingSecretKey: GEMINI_API_KEY

env: []
