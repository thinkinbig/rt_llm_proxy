{{- if and .Values.gemini.apiKey (not .Values.gemini.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rt-llm-proxy.fullname" . }}
  labels:
    {{- include "rt-llm-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  GEMINI_API_KEY: {{ .Values.gemini.apiKey | quote }}
  {{- if .Values.gemini.model }}
  GEMINI_MODEL: {{ .Values.gemini.model | quote }}
  {{- end }}
{{- end }}
