apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rt-llm-proxy.fullname" . }}
  labels:
    {{- include "rt-llm-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rt-llm-proxy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        {{- include "rt-llm-proxy.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: proxy
    spec:
      containers:
        - name: proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -addr
            - :8080
            {{- if .Values.redis.enabled }}
            - -redis
            - {{ include "rt-llm-proxy.redis.addr" . | quote }}
            {{- end }}
            - -rl-max
            - {{ .Values.rateLimit.max | quote }}
            - -rl-window
            - {{ .Values.rateLimit.window | quote }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "rt-llm-proxy.gemini.secretName" . }}
                  key: {{ .Values.gemini.existingSecretKey }}
            {{- if .Values.gemini.model }}
            - name: GEMINI_MODEL
              value: {{ .Values.gemini.model | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /demo/
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /demo/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
